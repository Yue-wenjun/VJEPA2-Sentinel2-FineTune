app: vjepa_2_1_sentinel2

# ── Compute ──────────────────────────────────────────────────────────────────
nodes: 1
tasks_per_node: 1            # set to number of GPUs available
cpus_per_task: 4
folder: /your_folder/finetune_s2/vitl.224px.8f

# ── Sentinel-2 data ──────────────────────────────────────────────────────────
sentinel2:
  sequences_csv: /your_data/s2_data/sequences.csv
  # base_dir: parent directory of the s2_data/ folder. Leave empty to use
  # sequences_csv's parent directory (works when data is next to the CSV).
  base_dir: ""
  pretrained_checkpoint: /your_checkpoints/vjepa2_vitl.pth
  # Bands in order stored in .npy files: B02 B03 B04 B08 B11 B12
  in_chans: 6
  # Cloud ablation group. Options:
  #   A: 0.10  (clean baseline)
  #   B: 0.30  (default)
  #   C: 1.00  (all frames, no filter)
  max_cloud_frac: 0.30

# ── Data loading ─────────────────────────────────────────────────────────────
data:
  batch_size: 16
  crop_size: 224
  patch_size: 16
  frames_per_clip: 8         # T: number of S2 acquisitions per training sample
  tubelet_size: 2            # must match pretrained model
  num_workers: 4
  persistent_workers: true
  pin_mem: true
  random_clip: true          # randomly subsample T frames from available sequence

data_aug:
  random_horizontal_flip: true
  random_resize_scale:
    - 0.5
    - 1.0
  random_resize_aspect_ratio:
    - 0.9
    - 1.1
  auto_augment: false        # disabled (Apache file removed)
  reprob: 0.0                # disabled (Apache file removed)
  motion_shift: false

# ── Mask collator (same format as V-JEPA 2.1 pretraining) ────────────────────
mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    num_blocks: 8
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0
    max_temporal_keep: 1.0
    full_complement: false
    max_keep: null
  - aspect_ratio:
      - 0.75
      - 1.5
    num_blocks: 2
    spatial_scale:
      - 0.7
      - 0.7
    temporal_scale:
      - 1.0
      - 1.0
    max_temporal_keep: 1.0
    full_complement: false
    max_keep: null

# ── Loss ─────────────────────────────────────────────────────────────────────
loss:
  loss_exp: 1.0
  predict_all: true
  reg_coeff: 0.0
  shift_by_n: 0
  weight_distance_loss: true

# ── Model ────────────────────────────────────────────────────────────────────
model:
  model_name: vit_large
  in_chans: 6                # S2 6-band input
  use_doy_encoding: true     # DOY sinusoidal + learned projection
  use_rope: false            # must be false when use_doy_encoding=true
                             # (DOY injection requires learned pos_embed)
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  modality_embedding: false  # single modality (no img/video mixing)
  has_cls_first: false
  n_registers: 0
  n_registers_predictor: 0
  normalize_predictor: false
  use_mask_tokens: true
  zero_init_mask_tokens: true
  use_activation_checkpointing: false
  use_sdpa: true

# ── Optimization: 3-stage fine-tuning ────────────────────────────────────────
#
#  Stage 1: freeze entire ViT backbone, train only patch_embed + doy_encoding
#  Stage 2: unfreeze last 6 transformer blocks
#  Stage 3: full fine-tune at low lr
#
optimization:
  ema:
    - 0.9995
    - 0.9995

  stage1:
    epochs: 20
    lr: 1.0e-3
    start_lr: 1.0e-4
    final_lr: 1.0e-4
    weight_decay: 0.05
    final_weight_decay: 0.05
    warmup: 5
    freeze_backbone: true
    unfreeze_last_n_blocks: 0

  stage2:
    epochs: 30
    lr: 5.0e-5
    start_lr: 5.0e-5
    final_lr: 1.0e-5
    weight_decay: 0.05
    final_weight_decay: 0.05
    warmup: 3
    freeze_backbone: false
    unfreeze_last_n_blocks: 6

  stage3:
    epochs: 50
    lr: 1.0e-5
    start_lr: 1.0e-5
    final_lr: 1.0e-6
    weight_decay: 0.04
    final_weight_decay: 0.04
    warmup: 0
    freeze_backbone: false
    unfreeze_last_n_blocks: -1   # -1 means all blocks

# ── Logging / checkpointing ───────────────────────────────────────────────────
meta:
  dtype: bfloat16
  seed: 42
  eval_freq: 5              # evaluate downstream task every N epochs
  save_every_freq: 10
  load_checkpoint: false
  read_checkpoint: null
  use_sdpa: true
