app: vjepa_2_1_olmoearth

# ── Compute ──────────────────────────────────────────────────────────────────
nodes: 1
tasks_per_node: 1            # set to number of GPUs available
cpus_per_task: 4
folder: /your_folder/finetune_olmoearth/vitl.256px.12f

# ── OLMo-Earth data (local TAR files) ────────────────────────────────────────
olmoearth:
  # Glob pattern pointing to your locally downloaded TAR shards.
  # Download: https://hf-mirror.com/datasets/allenai/olmoearth_pretrain_dataset/tree/main/10_sentinel2_l2a_monthly
  tar_path: "/your_data/olmoearth/10_sentinel2_l2a_monthly/*.tar"

  # 10_sentinel2_l2a_monthly = 10 m bands only: B02 B03 B04 B08
  # → 4 bands × 12 months = 48 channels per GeoTIFF.
  # NOTE: B11/B12 (SWIR) live in 20_sentinel2_l2a_monthly (not downloaded yet).
  #       Download that folder and set n_bands_per_timestep=12 to enable 6-band mode.
  n_bands_per_timestep: 4

  # Raw pixel scale: 10000.0 if GeoTIFF stores DN (0-10000), 1.0 if reflectance.
  # Run: python -c "from data_pipeline.olmoearth_dataset import inspect_sample; inspect_sample('<tar_path>')"
  dn_scale: 10000.0
  max_missing_frac: 0.10     # skip sample if > 10% pixels are MISSING (-99999)
  shuffle_buffer: 1000

pretrained_checkpoint: /your_checkpoints/vjepa2_vitl.pth

# ── Data loading ─────────────────────────────────────────────────────────────
data:
  # 256px = OLMo-Earth native tile size (2560 m / 10 m/px). Cannot crop > 256px.
  # Token count: (256/16)^2 × (12/tubelet_size=2) = 256 × 6 = 1536
  batch_size: 16
  crop_size: 256
  patch_size: 16
  frames_per_clip: 12        # 12 fixed monthly composites
  tubelet_size: 2
  num_workers: 4
  persistent_workers: true
  pin_mem: true
  # IterableDataset has no __len__; provide steps/epoch for LR scheduler.
  # Estimate: 285,288 samples / batch_size 16 ≈ 17,830 steps/epoch.
  ipe: 17830

# ── Mask collator (same format as V-JEPA 2.1 pretraining) ────────────────────
mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    num_blocks: 8
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0
    max_temporal_keep: 1.0
    full_complement: false
    max_keep: null
  - aspect_ratio:
      - 0.75
      - 1.5
    num_blocks: 2
    spatial_scale:
      - 0.7
      - 0.7
    temporal_scale:
      - 1.0
      - 1.0
    max_temporal_keep: 1.0
    full_complement: false
    max_keep: null

# ── Loss ─────────────────────────────────────────────────────────────────────
loss:
  loss_exp: 1.0
  predict_all: true
  reg_coeff: 0.0

# ── Model ────────────────────────────────────────────────────────────────────
model:
  model_name: vit_large
  # 4 bands from 10_sentinel2_l2a_monthly: B02 B03 B04 B08
  # Change to 6 when 20_sentinel2_l2a_monthly is also available.
  in_chans: 4
  use_doy_encoding: true     # monthly DOY still informative for phenology
  use_rope: true             # checkpoint was trained with RoPE (no pos_embed saved)
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  uniform_power: true
  modality_embedding: false
  has_cls_first: false
  n_registers: 0
  n_registers_predictor: 0
  use_mask_tokens: true
  zero_init_mask_tokens: true
  use_activation_checkpointing: false
  use_sdpa: true

# ── Optimization: 3-stage fine-tuning ────────────────────────────────────────
optimization:
  ema:
    - 0.9995
    - 0.9995

  stage1:
    epochs: 5                    # patch_embed+doy_encoding only; converges in ~1 epoch
    lr: 1.0e-3                   # scaled ×world_size at runtime (e.g. 4e-3 for 4 GPUs)
    start_lr: 1.0e-4
    final_lr: 1.0e-4
    weight_decay: 0.05
    final_weight_decay: 0.05
    warmup: 2
    freeze_backbone: true
    unfreeze_last_n_blocks: 0
    early_stop_patience: 3       # advance if no improvement for 3 consecutive epochs
    min_epochs_before_stop: 2    # skip warmup epochs before checking patience

  stage2:
    epochs: 30
    lr: 5.0e-5
    start_lr: 5.0e-5
    final_lr: 1.0e-5
    weight_decay: 0.05
    final_weight_decay: 0.05
    warmup: 3
    freeze_backbone: true
    unfreeze_last_n_blocks: 6
    # early_stop_patience: 8    # uncomment to enable; stage2 needs more epochs to converge

  stage3:
    epochs: 50
    lr: 1.0e-5
    start_lr: 1.0e-5
    final_lr: 1.0e-6
    weight_decay: 0.04
    final_weight_decay: 0.04
    warmup: 0
    freeze_backbone: false
    unfreeze_last_n_blocks: -1
    # no early_stop_patience: stage3 is full fine-tune; let the cosine schedule complete

# ── Logging / checkpointing ───────────────────────────────────────────────────
meta:
  dtype: bfloat16
  seed: 42
  save_every_freq: 10
  load_checkpoint: false
  read_checkpoint: null
  use_sdpa: true
